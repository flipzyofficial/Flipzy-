
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flipzy - Your Shopping Partner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    header { background: #1e1e2f; padding: 15px; color: white; text-align: center; }
    nav { background: #333; display: flex; justify-content: center; }
    nav a { color: white; padding: 14px 20px; text-decoration: none; display: block; }
    nav a:hover { background: #575757; }
    .banner { background: url('https://via.placeholder.com/1200x400?text=Welcome+to+Flipzy') center/cover no-repeat; height: 400px; }
    .products { padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .product-card { border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 10px; }
    .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    footer { background: #1e1e2f; color: white; text-align: center; padding: 20px; margin-top: 40px; }
    h2 { text-align: center; color: #333; }
  </style>
</head>
<body>

  <header>
    <h1>Flipzy</h1>
    <p>Your New Shopping Partner 🤩</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Men</a>
    <a href="#">Women</a>
    <a href="#">Electronics</a>
    <a href="#">Skin Care</a>
    <a href="#">Contact</a>
  </nav>

  <div class="banner"></div>

  <h2>Featured Products</h2>
  <section class="products">
    <div class="product-card">
      <img src="https://via.placeholder.com/300x200?text=Blue+Shirt" alt="Blue Shirt">
      <h3>Flipzy Men's Blue Shirt</h3>
      <p>₹699</p>
      <button>Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="https://via.placeholder.com/300x200?text=Face+Wash" alt="Face Wash">
      <h3>Flipzy Coffee Face Wash</h3>
      <p>₹349</p>
      <button>Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="https://via.placeholder.com/300x200?text=Smartphone" alt="Smartphone">
      <h3>Flipzy Smart Phone</h3>
      <p>₹11,999</p>
      <button>Add to Cart</button>
    </div>
  </section>

  <footer>
    <p>Follow us on Instagram: <a href="https://www.instagram.com/flipzy.official" style="color:#ffb703;">@flipzy.official</a></p>
    <p>&copy; 2025 Flipzy. All rights reserved.</p>
  </footer>

</body>
</html>
